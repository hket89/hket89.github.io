<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="#111318"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="96" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="6"/>

  <!-- HK monogram in amber, monospace-style -->
  <text
    x="256"
    y="310"
    font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="220"
    font-weight="700"
    fill="#f5b944"
    text-anchor="middle"
    letter-spacing="-8"
  >HK</text>

  <!-- Green "online" dot — bottom right -->
  <circle cx="390" cy="390" r="38" fill="#0d0f12"/>
  <circle cx="390" cy="390" r="26" fill="#4ade80"/>
</svg>
